<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration - Saranya Jewellery</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-burgundy: #6f0022;
            --brand-burgundy-dark: #4f0018;
            --brand-gold: #e0bf63;
            --brand-gold-strong: #f3d97f;
            --text-soft: #f7ebc4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #7d0c30 0%, var(--brand-burgundy) 45%, var(--brand-burgundy-dark) 100%);
            color: var(--text-soft);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(224, 191, 99, 0.22);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area h1 {
            color: var(--brand-gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-area p {
            color: var(--text-soft);
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-soft);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(224, 191, 99, 0.3);
            border-radius: 8px;
            color: var(--text-soft);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            background: var(--brand-burgundy-dark);
            color: var(--text-soft);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--brand-gold);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input::placeholder {
            color: rgba(247, 235, 196, 0.5);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--brand-gold) 0%, var(--brand-gold-strong) 100%);
            color: var(--brand-burgundy-dark);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(224, 191, 99, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ffcccc;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.5);
            color: #ccffcc;
        }

        .footer-links {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(224, 191, 99, 0.2);
        }

        .footer-links a {
            color: var(--brand-gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--brand-gold-strong);
        }

        .divider {
            margin: 0 0.5rem;
            color: rgba(224, 191, 99, 0.5);
        }

        .info-note {
            background: rgba(224, 191, 99, 0.1);
            border: 1px solid rgba(224, 191, 99, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--brand-gold-strong);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-area">
            <h1>Saranya</h1>
            <p>Staff Portal Registration</p>
        </div>

        <div class="info-note">
            📌 Your account will be pending approval until an administrator reviews and approves it.
        </div>

        <div id="alert" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="role">Select Your Role</label>
                <select id="role" name="role" required>
                    <option value="">-- Choose Role --</option>
                    <option value="Customer Care">Customer Care</option>
                    <option value="Inventory">Inventory</option>
                    <option value="Order Management">Order Management</option>
                    <option value="Loyalty Management">Loyalty Management</option>
                    <option value="Product Management">Product Management</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required minlength="6">
            </div>

            <button type="submit" class="btn" id="registerBtn">Register</button>
        </form>

        <div class="footer-links">
            <a href="/staff-login">Already have an account? Login</a>
            <span class="divider">|</span>
            <a href="/">Back to Home</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const alertDiv = document.getElementById('alert');

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertDiv.className = 'alert';
            }, 5000);
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!fullName || !email || !role || !password || !confirmPassword) {
                showAlert('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fullName, email, role, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Registration successful! Redirecting to login...', 'success');
                    registerForm.reset();
                    
                    setTimeout(() => {
                        window.location.href = '/staff-login';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registration failed');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Register';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Network error. Please try again.');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
