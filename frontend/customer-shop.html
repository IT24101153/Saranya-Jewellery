<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Saranya Jewellery</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div><i class="fas fa-phone"></i> <a href="tel:+1234567890">Contact Us</a></div>
        <div id="customerStatusArea" style="display: flex; align-items: center; gap: 0.6rem;">
            <span id="customerName" style="color: var(--brand-gold-strong);">Guest</span>
            <span id="loyaltyPoints" style="display: none;">Loyalty: 0 Points</span>
            <a id="customerLoginLink" href="/customer-login" class="logout-btn" style="font-size: 0.85rem; padding: 0.3rem 0.8rem; text-decoration: none;">Login</a>
            <a id="customerRegisterLink" href="/customer-register" class="logout-btn" style="font-size: 0.85rem; padding: 0.3rem 0.8rem; text-decoration: none;">Register</a>
            <button id="customerLogoutBtn" class="logout-btn" onclick="logout()" style="display: none; font-size: 0.85rem; padding: 0.3rem 0.8rem;">Logout</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/customer-shop">Shop</a>
            <a href="/customer-orders" data-requires-auth="true">My Orders</a>
            <a href="/customer-loyalty" data-requires-auth="true">Loyalty</a>
            <a href="/customer-support" data-requires-auth="true">Support</a>
        </div>
        
        <div class="logo">SARANYA JEWELLERY</div>
        
        <div class="header-icons">
            <i class="fas fa-search header-icon"></i>
            <a id="userProfileLink" href="/customer-login"><i class="fas fa-user header-icon"></i></a>
            <a id="cartLink" href="/customer-cart" style="position: relative;">
                <i class="fas fa-shopping-cart header-icon"></i>
                <span id="cartBadge" style="display: none; position: absolute; top: -8px; right: -8px; background: var(--brand-gold-strong); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem;">0</span>
            </a>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 2rem;">
            <h1 style="text-align: center; margin-bottom: 2rem; font-family: 'Cormorant Garamond', serif; color: var(--brand-burgundy);">Fine Jewellery Collection</h1>

            <!-- Filters -->
            <div class="filter-container" style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center;">
                <div>
                    <label for="categoryFilter">Category:</label>
                    <select id="categoryFilter" onchange="loadProducts()">
                        <option value="">All Categories</option>
                        <option value="Ring">Ring</option>
                        <option value="Necklace">Necklace</option>
                        <option value="Bracelet">Bracelet</option>
                        <option value="Earring">Earring</option>
                        <option value="Pendant">Pendant</option>
                        <option value="Chain">Chain</option>
                        <option value="Bangles">Bangles</option>
                        <option value="Anklet">Anklet</option>
                    </select>
                </div>

                <div>
                    <label for="karatFilter">Karat:</label>
                    <select id="karatFilter" onchange="loadProducts()">
                        <option value="">All Types</option>
                        <option value="18K">18K</option>
                        <option value="22K">22K</option>
                        <option value="24K">24K</option>
                    </select>
                </div>

                <div>
                    <label for="availabilityFilter">Availability:</label>
                    <select id="availabilityFilter" onchange="loadProducts()">
                        <option value="">All</option>
                        <option value="true">In Stock</option>
                        <option value="false">Out of Stock</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="productsGrid" class="category-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;">
                <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">
                    Loading products...
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import authManager from '/src/auth.js';

        let cart = JSON.parse(localStorage.getItem('saranyaCart') || '[]');
        let isAuthenticated = false;
        let reviewSummaryByProduct = {};

        function renderStars(rating) {
            const value = Number(rating) || 0;
            return [1, 2, 3, 4, 5].map((star) => {
                const filled = star <= Math.round(value);
                return `<span style="color: ${filled ? '#e0bf63' : '#ddd'}; font-size: 0.95rem;">${filled ? '★' : '☆'}</span>`;
            }).join('');
        }

        function getCurrentReturnPath() {
            return `${window.location.pathname}${window.location.search}${window.location.hash}`;
        }

        function setActiveNavLink() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav a').forEach((link) => {
                const href = link.getAttribute('href');
                if (!href || href.startsWith('#')) return;
                if (href === currentPath) {
                    link.classList.add('active');
                }
            });
        }

        function goToCustomerLogin() {
            authManager.redirectToLogin('customer', { returnTo: getCurrentReturnPath() });
        }

        function updateCustomerHeader(customer) {
            const customerName = document.getElementById('customerName');
            const loyaltyPoints = document.getElementById('loyaltyPoints');
            const loginLink = document.getElementById('customerLoginLink');
            const registerLink = document.getElementById('customerRegisterLink');
            const logoutBtn = document.getElementById('customerLogoutBtn');
            const userProfileLink = document.getElementById('userProfileLink');

            if (customer) {
                isAuthenticated = true;
                customerName.textContent = customer.fullName || customer.email;
                loyaltyPoints.textContent = `Loyalty: ${customer.loyaltyPoints || 0} Points`;
                loyaltyPoints.style.display = 'inline';
                loginLink.style.display = 'none';
                registerLink.style.display = 'none';
                logoutBtn.style.display = 'inline-flex';
                userProfileLink.href = '/customer-dashboard?openProfile=true';
                userProfileLink.title = customer.fullName || customer.email;
            } else {
                isAuthenticated = false;
                customerName.textContent = 'Guest';
                loyaltyPoints.style.display = 'none';
                loginLink.href = `/customer-login?redirect=${encodeURIComponent(getCurrentReturnPath())}`;
                registerLink.href = `/customer-register?redirect=${encodeURIComponent(getCurrentReturnPath())}`;
                loginLink.style.display = 'inline-flex';
                registerLink.style.display = 'inline-flex';
                logoutBtn.style.display = 'none';
                userProfileLink.href = `/customer-login?redirect=${encodeURIComponent(getCurrentReturnPath())}`;
                userProfileLink.title = 'Login to your account';
            }
        }

        async function checkAuth() {
            const customer = await authManager.checkCustomerAuth({
                redirectOnFail: false,
                returnToCurrentPath: false
            });
            updateCustomerHeader(customer);
            updateCartBadge();
        }

        function attachProtectedLinkHandlers() {
            const protectedLinks = document.querySelectorAll('a[data-requires-auth="true"]');
            protectedLinks.forEach((link) => {
                link.addEventListener('click', (event) => {
                    if (isAuthenticated) {
                        return;
                    }

                    event.preventDefault();
                    const target = link.getAttribute('href');
                    authManager.redirectToLogin('customer', { returnTo: target || getCurrentReturnPath() });
                });
            });

            const cartLink = document.getElementById('cartLink');
            cartLink.addEventListener('click', (event) => {
                if (isAuthenticated) {
                    return;
                }
                event.preventDefault();
                goToCustomerLogin();
            });
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        async function loadProducts() {
            try {
                const params = new URLSearchParams();
                const cat = document.getElementById('categoryFilter').value;
                const kar = document.getElementById('karatFilter').value;
                const avail = document.getElementById('availabilityFilter').value;
                
                if (cat) params.set('category', cat);
                if (kar) params.set('karat', kar);
                if (avail) params.set('isAvailable', avail);

                const query = params.toString();
                const url = query ? `/api/products?${query}` : '/api/products';

                const res = await authManager.apiRequest(url);
                if (!res.ok) throw new Error('Failed to load products');
                
                const products = await res.json();
                await loadReviewSummary(products);
                displayProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">Error loading products</div>';
            }
        }

        async function loadReviewSummary(products) {
            try {
                const productIds = products
                    .map((product) => product?._id)
                    .filter(Boolean);

                if (!productIds.length) {
                    reviewSummaryByProduct = {};
                    return;
                }

                const query = encodeURIComponent(productIds.join(','));
                const response = await authManager.apiRequest(`/api/reviews/summary?productIds=${query}`);

                if (!response.ok) {
                    reviewSummaryByProduct = {};
                    return;
                }

                const data = await response.json();
                reviewSummaryByProduct = data.summary || {};
            } catch (error) {
                console.error('Error loading review summary:', error);
                reviewSummaryByProduct = {};
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">No products found</div>';
                return;
            }

            grid.innerHTML = products.map((product) => {
                const summary = reviewSummaryByProduct[product._id] || { avgRating: 0, totalReviews: 0 };
                const hasReviews = Number(summary.totalReviews || 0) > 0;
                const reviewBlock = hasReviews
                    ? `<div style="display: flex; align-items: center; gap: 0.45rem; margin: 0.35rem 0 0.5rem;">
                        <span>${renderStars(summary.avgRating)}</span>
                        <span style="font-size: 0.82rem; color: #666;">${summary.avgRating.toFixed(1)} (${summary.totalReviews})</span>
                    </div>`
                    : `<p style="font-size: 0.82rem; color: #999; margin: 0.35rem 0 0.5rem;">No reviews yet</p>`;

                return `
                <div class="category-card" style="cursor: pointer; padding: 1rem; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s;" onclick="openProductPage('${product._id}')">
                    <img src="${product.imageUrl || '/SaranyaLOGO.jpg'}" alt="${product.name}" style="width: 100%; height: 250px; object-fit: cover; border-radius: 4px;">
                    <h3 style="margin: 1rem 0 0.5rem; color: var(--brand-burgundy);">${product.name}</h3>
                    <p style="color: #666; font-size: 0.9rem; margin: 0.5rem 0;">${product.category} - ${product.karat}</p>
                    ${reviewBlock}
                    <p style="color: var(--brand-gold-strong); font-weight: 600; font-size: 1.1rem; margin: 0.5rem 0;">Rs. ${product.price?.toLocaleString() || 'N/A'}</p>
                    <p style="color: #666; font-size: 0.85rem; margin: 0.25rem 0;">Stock: ${product.stockQuantity ?? 0}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                        <span style="font-size: 0.85rem; color: ${product.isAvailable ? '#28a745' : '#dc3545'};">
                            ${product.isAvailable ? '✓ In Stock' : '✗ Out of Stock'}
                        </span>
                        ${product.isAvailable ? `
                            <button onclick="event.stopPropagation(); addToCart('${product._id}', event)" style="background: var(--brand-burgundy); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem;">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
            }).join('');
        }

        function openProductPage(productId) {
            window.location.href = `/customer-product?id=${encodeURIComponent(productId)}`;
        }

        async function addToCart(productId, e) {
            // Capture button reference immediately before any await
            const btn = e ? (e.target.closest ? e.target.closest('button') : e.target) : null;

            if (!isAuthenticated) {
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-user-lock"></i> Login Required';
                }
                setTimeout(() => {
                    goToCustomerLogin();
                }, 250);
                return;
            }

            try {
                const res = await authManager.apiRequest(`/api/products/${productId}`);
                if (!res.ok) throw new Error('Failed to load product');
                
                const product = await res.json();
                
                const existingItem = cart.find(item => item.productId === productId);
                if (existingItem) {
                    existingItem.quantity++;
                } else {
                    cart.push({
                        productId: product._id,
                        name: product.name,
                        price: product.price,
                        imageUrl: product.imageUrl,
                        category: product.category,
                        karat: product.karat,
                        quantity: 1
                    });
                }
                
                localStorage.setItem('saranyaCart', JSON.stringify(cart));
                updateCartBadge();
                
                // Show success message on button
                if (btn) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Added!';
                    btn.style.background = '#28a745';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = '';
                    }, 1000);
                }
            } catch (error) {
                console.error('Error adding to cart:', error);
                alert('Failed to add to cart');
            }
        }

        function logout() {
            authManager.logout();
        }

        // Make functions available globally
        window.openProductPage = openProductPage;
        window.addToCart = addToCart;
        window.logout = logout;

        // Initialize
        setActiveNavLink();
        attachProtectedLinkHandlers();
        checkAuth();
        loadProducts();
    </script>
</body>
</html>
