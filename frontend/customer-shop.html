<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Saranya Jewellery</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div><i class="fas fa-phone"></i> <a href="tel:+1234567890">Contact Us</a></div>
        <div>
            <span id="customerName" style="margin-right: 1rem; color: var(--brand-gold-strong);">Loading...</span>
            <span id="loyaltyPoints" style="margin-right: 1rem;">⭐ 0 Points</span>
            <button class="logout-btn" onclick="logout()" style="font-size: 0.85rem; padding: 0.3rem 0.8rem;">Logout</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="nav">
            <a href="/customer-dashboard">Dashboard</a>
            <a href="/customer-shop">Shop</a>
            <a href="/customer-orders">My Orders</a>
            <a href="#loyalty">Loyalty</a>
        </div>
        
        <div class="logo">SARANYA JEWELLERY</div>
        
        <div class="header-icons">
            <i class="fas fa-search header-icon"></i>
            <a href="/customer-dashboard?openProfile=true"><i class="fas fa-user header-icon"></i></a>
            <a href="/customer-cart" style="position: relative;">
                <i class="fas fa-shopping-cart header-icon"></i>
                <span id="cartBadge" style="display: none; position: absolute; top: -8px; right: -8px; background: var(--brand-gold-strong); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem;">0</span>
            </a>
        </div>
    </header>

    <main>
        <div class="container" style="padding-top: 2rem;">
            <h1 style="text-align: center; margin-bottom: 2rem; font-family: 'Cormorant Garamond', serif; color: var(--brand-burgundy);">Fine Jewellery Collection</h1>

            <!-- Filters -->
            <div class="filter-container" style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center;">
                <div>
                    <label for="categoryFilter">Category:</label>
                    <select id="categoryFilter" onchange="loadProducts()">
                        <option value="">All Categories</option>
                        <option value="Ring">Ring</option>
                        <option value="Necklace">Necklace</option>
                        <option value="Bracelet">Bracelet</option>
                        <option value="Earring">Earring</option>
                        <option value="Pendant">Pendant</option>
                        <option value="Chain">Chain</option>
                        <option value="Bangles">Bangles</option>
                        <option value="Anklet">Anklet</option>
                    </select>
                </div>

                <div>
                    <label for="karatFilter">Karat:</label>
                    <select id="karatFilter" onchange="loadProducts()">
                        <option value="">All Types</option>
                        <option value="18K">18K</option>
                        <option value="22K">22K</option>
                        <option value="24K">24K</option>
                    </select>
                </div>

                <div>
                    <label for="availabilityFilter">Availability:</label>
                    <select id="availabilityFilter" onchange="loadProducts()">
                        <option value="">All</option>
                        <option value="true">In Stock</option>
                        <option value="false">Out of Stock</option>
                    </select>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="productsGrid" class="category-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;">
                <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">
                    Loading products...
                </div>
            </div>
        </div>
    </main>

    <!-- Product Details Modal -->
    <div id="productModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; padding: 2rem;">
        <div style="background: white; border-radius: 8px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;">
            <button onclick="closeModal()" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #999; z-index: 10;">&times;</button>
            
            <div id="modalContent" style="padding: 2rem;">
                <!-- Content will be dynamically inserted -->
            </div>
        </div>
    </div>

    <script type="module">
        import authManager from '/src/auth.js';

        let cart = JSON.parse(localStorage.getItem('saranyaCart') || '[]');

        async function checkAuth() {
            const customer = await authManager.checkCustomerAuth();
            if (!customer) return;
            document.getElementById('customerName').textContent = customer.fullName || customer.email;
            const points = customer.loyaltyPoints || 0;
            document.getElementById('loyaltyPoints').textContent = `⭐ ${points} Points`;
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        async function loadProducts() {
            try {
                let url = '/api/products?isAvailable=true';
                const cat = document.getElementById('categoryFilter').value;
                const kar = document.getElementById('karatFilter').value;
                const avail = document.getElementById('availabilityFilter').value;
                
                if (cat) url += `&category=${cat}`;
                if (kar) url += `&karat=${kar}`;
                if (avail) url += `&isAvailable=${avail}`;

                const res = await authManager.apiRequest(url);
                if (!res.ok) throw new Error('Failed to load products');
                
                const products = await res.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">Error loading products</div>';
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #999;">No products found</div>';
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="category-card" style="cursor: pointer; padding: 1rem; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s;" onclick="showProductDetails('${product._id}')">
                    <img src="${product.imageUrl || '/SaranyaLOGO.jpg'}" alt="${product.name}" style="width: 100%; height: 250px; object-fit: cover; border-radius: 4px;">
                    <h3 style="margin: 1rem 0 0.5rem; color: var(--brand-burgundy);">${product.name}</h3>
                    <p style="color: #666; font-size: 0.9rem; margin: 0.5rem 0;">${product.category} - ${product.karat}</p>
                    <p style="color: var(--brand-gold-strong); font-weight: 600; font-size: 1.1rem; margin: 0.5rem 0;">Rs. ${product.price?.toLocaleString() || 'N/A'}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
                        <span style="font-size: 0.85rem; color: ${product.isAvailable ? '#28a745' : '#dc3545'};">
                            ${product.isAvailable ? '✓ In Stock' : '✗ Out of Stock'}
                        </span>
                        ${product.isAvailable ? `
                            <button onclick="event.stopPropagation(); addToCart('${product._id}', event)" style="background: var(--brand-burgundy); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem;">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function showProductDetails(productId) {
            try {
                const res = await authManager.apiRequest(`/api/products/${productId}`);
                if (!res.ok) throw new Error('Failed to load product');
                
                const product = await res.json();
                
                document.getElementById('modalContent').innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div>
                            <img src="${product.imageUrl || '/SaranyaLOGO.jpg'}" alt="${product.name}" style="width: 100%; border-radius: 8px;">
                        </div>
                        <div>
                            <h2 style="margin: 0 0 1rem; color: var(--brand-burgundy); font-family: 'Cormorant Garamond', serif;">${product.name}</h2>
                            <p style="color: var(--brand-gold-strong); font-size: 1.5rem; font-weight: 600; margin: 1rem 0;">Rs. ${product.price?.toLocaleString() || 'N/A'}</p>
                            
                            <div style="margin: 1.5rem 0;">
                                <p style="margin: 0.5rem 0;"><strong>Category:</strong> ${product.category}</p>
                                <p style="margin: 0.5rem 0;"><strong>Karat:</strong> ${product.karat}</p>
                                <p style="margin: 0.5rem 0;"><strong>Weight:</strong> ${product.weight}g</p>
                                <p style="margin: 0.5rem 0;"><strong>SKU:</strong> ${product.sku}</p>
                                <p style="margin: 0.5rem 0;"><strong>Availability:</strong> 
                                    <span style="color: ${product.isAvailable ? '#28a745' : '#dc3545'};">
                                        ${product.isAvailable ? '✓ In Stock' : '✗ Out of Stock'}
                                    </span>
                                </p>
                            </div>

                            <div style="margin: 1.5rem 0;">
                                <p style="margin: 0 0 0.5rem; font-weight: 600;">Description:</p>
                                <p style="color: #666; line-height: 1.6;">${product.description || 'No description available'}</p>
                            </div>

                            ${product.isAvailable ? `
                                <button onclick="addToCartFromModal('${product._id}', event)" style="background: var(--brand-burgundy); color: white; border: none; padding: 1rem 2rem; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 1rem;">
                                    <i class="fas fa-cart-plus"></i> Add to Cart
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                document.getElementById('productModal').style.display = 'flex';
            } catch (error) {
                console.error('Error loading product details:', error);
                alert('Failed to load product details');
            }
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        async function addToCart(productId, e) {
            // Capture button reference immediately before any await
            const btn = e ? (e.target.closest ? e.target.closest('button') : e.target) : null;
            try {
                const res = await authManager.apiRequest(`/api/products/${productId}`);
                if (!res.ok) throw new Error('Failed to load product');
                
                const product = await res.json();
                
                const existingItem = cart.find(item => item.productId === productId);
                if (existingItem) {
                    existingItem.quantity++;
                } else {
                    cart.push({
                        productId: product._id,
                        name: product.name,
                        price: product.price,
                        imageUrl: product.imageUrl,
                        category: product.category,
                        karat: product.karat,
                        quantity: 1
                    });
                }
                
                localStorage.setItem('saranyaCart', JSON.stringify(cart));
                updateCartBadge();
                
                // Show success message on button
                if (btn) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check"></i> Added!';
                    btn.style.background = '#28a745';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = '';
                    }, 1000);
                }
            } catch (error) {
                console.error('Error adding to cart:', error);
                alert('Failed to add to cart');
            }
        }

        function addToCartFromModal(productId, e) {
            addToCart(productId, e);
            setTimeout(() => closeModal(), 1200);
        }

        function logout() {
            authManager.logout();
        }

        // Make functions available globally
        window.showProductDetails = showProductDetails;
        window.addToCart = addToCart;
        window.addToCartFromModal = addToCartFromModal;
        window.closeModal = closeModal;
        window.logout = logout;

        // Initialize
        checkAuth();
        loadProducts();
    </script>
</body>
</html>
